<!DOCTYPE> <html>>
<head>
    <meta charset="UTF-8">
    <title>CSS Model example</title>
    <style type="text/CSS">
        .example1 {
 width:200px;
 background-color: aqua;
 padding:0px;
 border:0px;
 margin:0px;
        }
.example2 {
    width:250px;

    border:5px solid black;
    margin:0px;
}

    background-color: red;
}

</body>
